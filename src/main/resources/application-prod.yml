spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/zjkl_sister?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    password: ${MYSQL_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      database: ${REDIS_DATABASE}
  lifecycle:
    timeout-per-shutdown-phase: 30s

milvus:
  host: ${MILVUS_HOST}
  port: ${MILVUS_PORT}

server:
  port: 8080
  shutdown: graceful

logging:
  level:
    dev.langchain4j: warn
    com.zjkl: info

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
