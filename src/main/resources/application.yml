
# ==================== 应用默认配置 ====================
app:
  default-image-url: ${APP_DEFAULT_IMAGE_URL}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 7200000        # 2 小时
  refresh-token-expiration: 604800000     # 7 天

spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: zjkl_sister_langchain4j
  datasource:
    password: ${MYSQL_PASSWORD}
    username: ${MYSQL_USERNAME}
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/zjkl_sister?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    driverClassName: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: MyHikariPool
      minimum-idle: 5
      maximum-pool-size: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
  profiles:
    # 默认激活开发环境
    active: dev
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      database: ${REDIS_DATABASE}
      password: ${REDIS_PASSWORD}
      connect-timeout: 5000
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  threads:
    virtual:
      # 启用虚拟线程（Java 21+）
      enabled: true

  task:
    scheduling:
      pool:
        size: 2

# ==================== LangChain4j 配置 ====================
langchain4j:
  community:
    dashscope:
      embedding-model:
        model-name: text-embedding-v3
        api-key: ${DASHSCOPE_API_KEY}
        dimension: 1024
      chat-model:
        model-name: qwen3.5-flash
        temperature: 0.7
        parameters:
          enable-thinking: false
          frequency-penalty: 1.0
          presence-penalty: 1.0
        api-key: ${DASHSCOPE_API_KEY}
      streaming-chat-model:
        model-name: qwen3.5-flash
        parameters:
          enable-thinking: false
        api-key: ${DASHSCOPE_API_KEY}
      vision-model:
        model-name: qwen3-vl-flash
        api-key: ${DASHSCOPE_API_KEY}

# ==================== Milvus 向量数据库配置 ====================
milvus:
  host: ${MILVUS_HOST}
  port: ${MILVUS_PORT}
  database: zjkl
  collection-name: zjkl_sister

# ==================== 偷看观察配置 ====================
peek:
  enabled: true
  base-probability: 0.08            # 基础概率 8%
  max-probability: 0.25            # 概率上限 25%
  cooldown-minutes: 90             # 冷却期 90 分钟
  active-threshold-minutes: 5      # 最近 5 分钟有操作视为活跃
  wakeup-mutex-minutes: 10         # wakeup 后 10 分钟内不 peek
  peek-request-ttl-seconds: 120    # 截图请求有效期 120 秒
  screenshot-folder: peek          # OSS 截图存储目录

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

# ==================== WebSocket 配置 ====================
websocket:
  # 允许的源地址（逗号分隔）
  allowed-origins: ${WEBSOCKET_ALLOWED_ORIGINS}

# ==================== MyBatis 配置 ====================
mybatis:
  configuration:
    map-underscore-to-camel-case: true  # 开启驼峰命名映射
  mapper-locations: classpath:mapper/*.xml

# ==================== 日志配置 ====================
logging:
  level:
    dev.langchain4j: debug
    com.zjkl: debug

# ==================== MCP 密钥配置 ====================
mcp:
  firecrawl:
    api-key: ${FIRECRAWL_API_KEY}
  context7:
    api-key: ${CONTEXT7_API_KEY}

# ==================== 阿里云 OSS 配置 ====================
aliyun:
  oss:
    endpoint: ${OSS_ENDPOINT}
    access-key-id: ${OSS_ACCESS_KEY_ID}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET}
    bucket-name: ${OSS_BUCKET_NAME}
    region: ${OSS_REGION}

# ==================== TTS 语音合成配置 ====================
tts:
  model: ${TTS_MODEL}
  voice: ${TTS_VOICE}

server:
  port: 8080
